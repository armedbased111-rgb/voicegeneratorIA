name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    name: macOS (DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps + PyInstaller
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install elevenlabs typer python-dotenv pyinstaller

      - name: Build voice binary → app/dist-bin/voice
        run: |
          .venv/bin/pyinstaller --onefile --name voice --collect-all elevenlabs --collect-all httpx --hidden-import anyio --hidden-import anyio._backends._asyncio --hidden-import anyio._backends._trio --hidden-import certifi --hidden-import dotenv voice.py
          mkdir -p app/dist-bin
          cp dist/voice app/dist-bin/voice
          chmod +x app/dist-bin/voice

      - name: Create .env
        run: echo "ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}" > .env

      - name: Install node deps
        working-directory: app
        run: npm ci

      - name: electron-vite build
        working-directory: app
        run: npx electron-vite build

      - name: electron-builder --mac
        working-directory: app
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          DEBUG: electron-builder

      - uses: actions/upload-artifact@v4
        with:
          name: VoiceGeneratorIA-mac
          path: app/release/*.dmg
          retention-days: 30

  build-win:
    name: Windows (NSIS installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps + PyInstaller
        shell: cmd
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          .venv\Scripts\pip install elevenlabs typer python-dotenv pyinstaller

      - name: Build voice binary → app/dist-bin/voice.exe
        shell: cmd
        run: |
          .venv\Scripts\pyinstaller --onefile --name voice --collect-all elevenlabs --collect-all httpx --hidden-import anyio --hidden-import anyio._backends._asyncio --hidden-import anyio._backends._trio --hidden-import certifi --hidden-import dotenv voice.py
          mkdir app\dist-bin
          copy dist\voice.exe app\dist-bin\voice.exe

      - name: Create .env
        shell: bash
        run: echo "ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}" > .env

      - name: Install node deps
        working-directory: app
        run: npm ci

      - name: electron-vite build
        working-directory: app
        run: npx electron-vite build

      - name: electron-builder --win
        working-directory: app
        run: npx electron-builder --win --publish never
        env:
          DEBUG: electron-builder

      - uses: actions/upload-artifact@v4
        with:
          name: VoiceGeneratorIA-win
          path: app/release/*.exe
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: VoiceGeneratorIA-mac
          path: artifacts/mac

      - uses: actions/download-artifact@v4
        with:
          name: VoiceGeneratorIA-win
          path: artifacts/win

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mac/*.dmg
            artifacts/win/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
