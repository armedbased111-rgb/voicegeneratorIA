name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # permet de lancer manuellement depuis GitHub

jobs:
  build-mac:
    name: macOS (DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create Python venv (macOS)
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install elevenlabs typer python-dotenv

      - name: Create .env from secret
        run: echo "ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}" > .env

      - name: Install node dependencies
        working-directory: app
        run: npm ci

      - name: Build DMG
        working-directory: app
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceGeneratorIA-mac
          path: app/dist/*.dmg
          retention-days: 30

  build-win:
    name: Windows (NSIS installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create Python venv (Windows)
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          .venv\Scripts\pip install elevenlabs typer python-dotenv

      - name: Create .env from secret
        run: echo "ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}" > .env

      - name: Install node dependencies
        working-directory: app
        run: npm ci

      - name: Build Windows installer
        working-directory: app
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceGeneratorIA-win
          path: app/dist/*.exe
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: VoiceGeneratorIA-mac
          path: artifacts/mac

      - name: Download Win artifact
        uses: actions/download-artifact@v4
        with:
          name: VoiceGeneratorIA-win
          path: artifacts/win

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mac/*.dmg
            artifacts/win/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
