name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    name: macOS (DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies + PyInstaller
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install elevenlabs typer python-dotenv pyinstaller

      - name: Build voice binary (macOS)
        run: |
          .venv/bin/pyinstaller --onefile --name voice voice.py
          mkdir -p dist-bin
          cp dist/voice dist-bin/voice
          chmod +x dist-bin/voice

      - name: Create .env
        run: echo "ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}" > .env

      - name: Install node dependencies
        working-directory: app
        run: npm ci

      - name: Build DMG
        working-directory: app
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: VoiceGeneratorIA-mac
          path: app/dist/*.dmg
          retention-days: 30

  build-win:
    name: Windows (NSIS installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies + PyInstaller
        shell: cmd
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          .venv\Scripts\pip install elevenlabs typer python-dotenv pyinstaller

      - name: Build voice binary (Windows)
        shell: cmd
        run: |
          .venv\Scripts\pyinstaller --onefile --name voice voice.py
          mkdir dist-bin
          copy dist\voice.exe dist-bin\voice.exe

      - name: Create .env
        shell: bash
        run: echo "ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}" > .env

      - name: Install node dependencies
        working-directory: app
        run: npm ci

      - name: Build Windows installer
        working-directory: app
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: VoiceGeneratorIA-win
          path: app/dist/*.exe
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: VoiceGeneratorIA-mac
          path: artifacts/mac

      - uses: actions/download-artifact@v4
        with:
          name: VoiceGeneratorIA-win
          path: artifacts/win

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mac/*.dmg
            artifacts/win/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
